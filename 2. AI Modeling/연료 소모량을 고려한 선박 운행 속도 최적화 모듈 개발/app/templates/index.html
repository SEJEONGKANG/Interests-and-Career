<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>부산항 접안 시뮬레이터</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <!-- Logo -->
    <div class="logo-section">
      <div class="content">
        <h2>SNU SCM - KRISO</h2>
        <h2>SNU SCM - KRISO</h2>
      </div>
    </div>

    <!-- 메인 제목 -->
    <div class="page-title">
      <h1>부산항 접안 시뮬레이터</h1>
    </div>

    <div class="container">
      <!-- Input + 지도 Section (Left) -->
      <div class="input-section">
        <!-- 출발 시점 (원래 구조) -->
        <div class="input-group">
          <label>출발 시점</label>
          <div class="input-row">
            <input
              type="text"
              id="startTime"
              placeholder="출발 시점 선택"
              readonly
            />
            <button id="btnFetchWind">바람 정보 조회</button>
          </div>
          <div id="windInfoBox" class="wind-info" style="display: none">
            <strong>출발 시점 바람:</strong> <span id="windInfo">-</span>
          </div>
        </div>

        <!-- 지도에서 시작점 선택 -->
        <div class="input-group">
          <label>시작점 선택 (지도를 클릭하세요)</label>
          <div id="map"></div>
          <div class="grid-info">선택 격자: <span id="chosenGrid">-</span></div>
        </div>

        <!-- 시뮬레이션 버튼 -->
        <div class="simulate-button">
          <button id="simulateBtn" disabled>시뮬레이션 시작</button>
        </div>
      </div>

      <!-- Results Section (Right: 상세 결과만) -->
      <div class="results-section" id="resultsSection">
        <h3 class="results-title">상세 결과</h3>

        <div class="results-body">
          <div class="result-item">
            <span class="result-label">예정 목표시점</span>
            <span class="result-value" id="resTargetETA">-</span>
          </div>

          <div class="result-item">
            <span class="result-label">실제 도착시간</span>
            <span class="result-value" id="resActualETA">-</span>
          </div>

          <div class="result-item">
            <span class="result-label">CO₂ 배출량</span>
            <span class="result-value" id="resCO2">-</span>
          </div>

          <div class="result-item">
            <span class="result-label">SOx 배출량</span>
            <span class="result-value" id="resSOx">-</span>
          </div>

          <div class="result-item">
            <span class="result-label">운영비용</span>
            <span class="result-value" id="resCost">-</span>
          </div>

          <div class="result-item">
            <span class="result-label">바람 정보</span>
            <span class="result-value" id="resWind">-</span>
          </div>
        </div>

        <div class="viz-toggle">
          <button id="toggleViz">시각화 이미지 보기</button>
        </div>
      </div>
    </div>

    <!-- 아래 시각화 이미지 섹션 -->
    <div class="viz-section" id="vizSection">
      <div class="viz-card">
        <h3 class="viz-title">시각화 이미지</h3>
        <div class="viz-image-inner">
          <img id="vizImage" alt="시뮬레이션 결과 시각화" />
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <script>
      // Flatpickr 초기화 (먼저 실행)
      flatpickr("#startTime", {
        enableTime: true,
        dateFormat: "Y-m-d H:i",
        minuteIncrement: 10,
        time_24hr: true,
        locale: "ko",
        defaultDate: new Date(),
        maxDate: "today",
        theme: "dark",
      });

      // Map initialization
      const map = L.map("map").setView([34.8, 129.05], 8);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 18,
      }).addTo(map);

      // 시작점 마커용 예쁜 커스텀 아이콘
      const startIcon = L.divIcon({
        className: "start-marker-icon",
        html: '<div class="start-marker-dot"></div>',
        iconSize: [16, 16],
        iconAnchor: [8, 8],
      });

      let startMarker = null;
      let startGrid = null;
      let windData = null;
      let startDateTime = null;
      let routeLayers = []; // 경로 polyline + 점들을 모아두는 배열

      // ECA & VSR zones
      const ecaCoords = [
        [35.094771, 128.714361],
        [34.966718, 128.73024],
        [34.916517, 128.83328],
        [34.974876, 129.074249],
        [34.977802, 129.113344],
        [34.966386, 129.141338],
        [34.963849, 129.171464],
        [34.970423, 129.200973],
        [34.985509, 129.227173],
        [35.007729, 129.247673],
        [35.035056, 129.260604],
        [35.064998, 129.264785],
        [35.094822, 129.259836],
        [35.121808, 129.246207],
        [35.143494, 129.225142],
        [35.1579, 129.198563],
        [35.159635, 129.192781],
      ];
      L.polygon(ecaCoords, {
        color: "blue",
        fillColor: "blue",
        fillOpacity: 0.15,
      })
        .addTo(map)
        .bindPopup("ECA 구역");

      const vsr1Coords = [
        [35.09133004385173, 129.12660598754886],
        [35.03730543262893, 129.09244537353518],
        [34.758114796197944, 128.86799812316897],
        [34.701647773382, 129.07592296600345],
        [35.01558716614377, 129.52275753021243],
        [35.047231, 129.530433],
        [35.079392, 129.533831],
        [35.11167, 129.533414],
        [35.143764, 129.529182],
        [35.175372, 129.521169],
        [35.206198, 129.509448],
        [35.235952, 129.494124],
        [35.264353, 129.475337],
        [35.291134, 129.453261],
        [35.316041, 129.428101],
        [35.33915291306285, 129.40043807029727],
      ];
      const vsr2Coords = [
        [34.9895, 128.82906],
        [34.71917, 128.60417],
        [34.684002, 128.68016],
        [34.664838, 128.764349],
        [34.661093, 128.851571],
        [34.672945, 128.937721],
        [34.699833, 129.018736],
        [34.740492, 129.090793],
        [34.793002, 129.150474],
        [34.85488, 129.194933],
        [34.923196, 129.222026],
        [34.994705, 129.230425],
        [35.06639, 129.22139],
      ];
      L.polygon(vsr1Coords, {
        color: "purple",
        fillColor: "purple",
        fillOpacity: 0.12,
      })
        .addTo(map)
        .bindPopup("VSR 구역");
      L.polygon(vsr2Coords, {
        color: "purple",
        fillColor: "purple",
        fillOpacity: 0.12,
      })
        .addTo(map)
        .bindPopup("VSR 구역");

      // Map click handler
      map.on("click", function (e) {
        const lat = e.latlng.lat;
        const lon = e.latlng.lng;
        if (startMarker) map.removeLayer(startMarker);
        // 팝업 없이 커스텀 아이콘만 사용
        startMarker = L.marker([lat, lon], { icon: startIcon }).addTo(map);

        startGrid = convertToGrid(lat, lon);
        document.getElementById(
          "chosenGrid"
        ).textContent = `i=${startGrid.i}, j=${startGrid.j}`;
        maybeEnableSim();
      });

      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }

      // Python environment.py 와 동일한 위경도 박스 / 그리드 설정
      const GRID_SIZE = 15;
      const LAT_MIN = 33.8704;
      const LAT_MAX = 35.3935;
      const LON_MIN = 128.3367;
      const LON_MAX = 130.111;
      const dLat = (LAT_MAX - LAT_MIN) / GRID_SIZE;
      const dLon = (LON_MAX - LON_MIN) / GRID_SIZE;

      function convertToGrid(lat, lon) {
        // lat, lon -> 가장 가까운 격자 칸 (r=i, c=j)
        let iFloat = (LAT_MAX - lat) / dLat - 0.5;
        let jFloat = (lon - LON_MIN) / dLon - 0.5;

        let i = Math.round(iFloat);
        let j = Math.round(jFloat);

        i = clamp(i, 0, GRID_SIZE - 1);
        j = clamp(j, 0, GRID_SIZE - 1);

        return { i, j };
      }

      function gridToLatLon(i, j) {
        // 격자 칸 중심의 위경도
        const lat = LAT_MAX - (i + 0.5) * dLat;
        const lon = LON_MIN + (j + 0.5) * dLon;
        return { lat, lon };
      }

      // Fetch wind data
      document
        .getElementById("btnFetchWind")
        .addEventListener("click", async () => {
          const time = document.getElementById("startTime").value;
          if (!time) return alert("시점을 선택하세요.");

          startDateTime = new Date(time);

          try {
            const res = await fetch(
              `/wind?datetime=${encodeURIComponent(time)}`
            );
            const data = await res.json();

            if (!res.ok || data.error) {
              alert("기상청 데이터를 불러올 수 없습니다.");
              return;
            }

            windData = data;
            document.getElementById("windInfo").textContent = `${
              data.dir8
            } (${Number(data.dir).toFixed(1)}°), ${Number(data.speed).toFixed(
              2
            )} m/s`;
            document.getElementById("windInfoBox").style.display = "block";
            maybeEnableSim();
          } catch (err) {
            console.error(err);
            alert("바람 조회 중 오류가 발생했습니다.");
          }
        });

      function maybeEnableSim() {
        const btn = document.getElementById("simulateBtn");
        btn.disabled = !(startGrid && windData && startDateTime);
      }

      // Run simulation
      document
        .getElementById("simulateBtn")
        .addEventListener("click", async () => {
          if (!startGrid || !windData || !startDateTime) {
            return alert("일시와 시작점을 설정해주세요.");
          }

          const payload = {
            grid_i: startGrid.i,
            grid_j: startGrid.j,
            wind_dir: windData.dir,
            wind_speed: windData.speed,
          };

          const btn = document.getElementById("simulateBtn");
          btn.textContent = "실행 중...";
          btn.disabled = true;

          try {
            const response = await fetch("/simulate", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            const data = await response.json();

            if (!response.ok || data.error) {
              alert("시뮬레이션을 수행할 수 없습니다.");
            } else {
              const container = document.querySelector(".container");
              const resultsSection = document.getElementById("resultsSection");

              // 오른쪽 결과 패널 등장 + 왼쪽 폭 자연스럽게 축소
              resultsSection.style.display = "flex";
              container.classList.add("has-results");
              requestAnimationFrame(() => map.invalidateSize());
              displayResult(data);
            }
          } catch (err) {
            console.error(err);
            alert("시뮬레이션 중 오류가 발생했습니다.");
          } finally {
            btn.textContent = "시뮬레이션 시작";
            maybeEnableSim();
          }
        });

      function fitBoundsAfterLayout(latLngs) {
        const bounds = L.latLngBounds(latLngs);

        const doFit = () => {
          map.invalidateSize(); // ★ 핵심: Leaflet에게 새 크기 반영
          map.fitBounds(bounds, { padding: [20, 20] }); // 여백은 취향
        };

        // 1) 다음 프레임에 한 번 (클래스 토글 직후 레이아웃 반영)
        requestAnimationFrame(doFit);

        // 2) 패널 transition(0.4s) 끝난 뒤 한 번 더 (진짜 최종 너비 기준)
        setTimeout(doFit, 450);
      }

      function displayResult(data) {
        // ===== 1) ETA 계산 =====
        const hasEtaHistory =
          Array.isArray(data.eta_history) && data.eta_history.length > 0;

        const initialEtaMin = hasEtaHistory
          ? Number(data.eta_history[0])
          : Number(data.eta || 0);

        const finalEtaMin = hasEtaHistory
          ? Number(data.eta_history[data.eta_history.length - 1])
          : 0;

        const elapsedMin = hasEtaHistory
          ? initialEtaMin - finalEtaMin
          : Number(data.eta || 0);

        // 예정 목표시점: 출발시각 + 초기 ETA
        const targetETA = startDateTime
          ? new Date(
              startDateTime.getTime() + initialEtaMin * 60000
            ).toLocaleString("ko-KR")
          : "-";

        // 실제 도착시간: 출발시각 + 실제 경과시간
        const actualArrival = startDateTime
          ? new Date(
              startDateTime.getTime() + elapsedMin * 60000
            ).toLocaleString("ko-KR")
          : "-";

        document.getElementById("resTargetETA").textContent = targetETA;
        document.getElementById("resActualETA").textContent = actualArrival;

        // ===== 2) 배출량 (ton → kg) =====
        const co2Ton = data.emission_co2;
        const soxTon = data.emission_sox;
        const co2Kg = co2Ton != null ? co2Ton * 1000 : null;
        const soxKg = soxTon != null ? soxTon * 1000 : null;

        document.getElementById("resCO2").textContent =
          co2Kg != null
            ? `${Number(co2Kg.toFixed(2)).toLocaleString()} kg`
            : "-";

        document.getElementById("resSOx").textContent =
          soxKg != null
            ? `${Number(soxKg.toFixed(2)).toLocaleString()} kg`
            : "-";

        // ===== 3) 비용 =====
        document.getElementById("resCost").textContent =
          data.cost != null ? `${Number(data.cost).toLocaleString()} 원` : "-";

        // ===== 4) 바람 / 대표 속력 =====
        document.getElementById("resWind").textContent = data.wind ?? "-";

        // ===== 5) 추천 경로를 '메인 지도(map)'에 그리기 =====

        // Python에서 _nearest_sea 로 보정된 시작 격자 (백엔드에서 start_pos 반환한다고 가정)
        const startCell =
          Array.isArray(data.start_pos) && data.start_pos.length === 2
            ? { i: data.start_pos[0], j: data.start_pos[1] }
            : startGrid; // fallback: 사용자가 선택한 격자

        // 이전 경로(선 + 점) 제거
        routeLayers.forEach((layer) => {
          map.removeLayer(layer);
        });
        routeLayers = [];

        if (data.dir_idx && data.dir_idx.length > 0 && startCell) {
          const routes = [];

          let currentI = startCell.i;
          let currentJ = startCell.j;
          routes.push([currentI, currentJ]);

          // 0: N, 1: NE, 2: E, 3: SE, 4: S, 5: SW, 6: W, 7: NW
          const dirMap = {
            0: [-1, 0],
            1: [-1, 1],
            2: [0, 1],
            3: [1, 1],
            4: [1, 0],
            5: [1, -1],
            6: [0, -1],
            7: [-1, -1],
          };

          for (let d of data.dir_idx) {
            if (dirMap[d]) {
              currentI += dirMap[d][0];
              currentJ += dirMap[d][1];
              routes.push([currentI, currentJ]);
            }
          }

          // 격자를 위경도로 변환
          const latLngs = routes.map(([i, j]) => {
            const pos = gridToLatLon(i, j);
            return [pos.lat, pos.lon];
          });

          // 경로 polyline
          const routeLine = L.polyline(latLngs, {
            color: "#03a9f4",
            weight: 3,
            opacity: 0.8,
          }).addTo(map);
          routeLayers.push(routeLine);

          // 지점별 속력 리스트
          const speedList = Array.isArray(data.rec_speed_list)
            ? data.rec_speed_list
            : [];

          // 실제 경로를 속도에 따라 색상을 다르게 표시
          if (speedList.length > 0) {
            const speeds = speedList.filter((s) => s != null && !isNaN(s));
            const minSpeed = Math.min(...speeds);
            const maxSpeed = Math.max(...speeds);
            const range = maxSpeed - minSpeed;

            for (let i = 0; i < latLngs.length - 1; i++) {
              const speed = speedList[i];
              let color = "#03a9f4"; // 기본색

              if (speed != null && !isNaN(speed) && range > 0) {
                const normalized = (speed - minSpeed) / range;
                if (normalized < 0.33) {
                  color = "#FFD700"; // 노랑 (느림)
                } else if (normalized < 0.67) {
                  color = "#FF8C00"; // 주황 (보통)
                } else {
                  color = "#FF4500"; // 빨강 (빠름)
                }
              }

              const segment = L.polyline([latLngs[i], latLngs[i + 1]], {
                color: color,
                weight: 4,
                opacity: 0.9,
              }).addTo(map);
              routeLayers.push(segment);
            }
          } else {
            // 속도 정보가 없으면 기본 경로선
            const routeLine = L.polyline(latLngs, {
              color: "#03a9f4",
              weight: 3,
              opacity: 0.8,
            }).addTo(map);
            routeLayers.push(routeLine);
          }

          // 각 지점 marker + tooltip
          latLngs.forEach((latLng, idx) => {
            let eta_elapsed = 0;
            if (data.eta_history && data.eta_history.length > idx) {
              eta_elapsed = data.eta_history[0] - data.eta_history[idx];
            }

            const time = startDateTime
              ? new Date(startDateTime.getTime() + eta_elapsed * 60000)
              : null;
            const timeStr = time ? time.toLocaleTimeString("ko-KR") : "-";

            const direction =
              data.intended_dir_idx && data.intended_dir_idx[idx] !== undefined // dir_idx에 실제 이동 담김
                ? ["북", "북동", "동", "남동", "남", "남서", "서", "북서"][
                    data.intended_dir_idx[idx]
                  ]
                : "-";

            const speedVal = idx < speedList.length ? speedList[idx] : null;
            const speedText =
              speedVal !== null && speedVal !== undefined ? speedVal : "-";

            const marker = L.circleMarker(latLng, {
              radius: 5,
              fillColor:
                idx === 0
                  ? "red"
                  : idx === latLngs.length - 1
                  ? "green"
                  : "#03a9f4",
              color: "#fff",
              weight: 2,
              opacity: 1,
              fillOpacity: 0.8,
            }).addTo(map);

            marker.bindTooltip(`
              <strong>${timeStr}</strong><br>
              방향: ${direction}<br>
              속도: ${speedText} knots
            `);

            routeLayers.push(marker);
          });

          // 지도가 경로를 잘 감싸도록
          fitBoundsAfterLayout(latLngs);
        }

        // ===== 6) 시각화 이미지: 아래 섹션에만 주입 =====
        const vizImg = document.getElementById("vizImage");
        const vizSection = document.getElementById("vizSection");

        if (data.viz_url) {
          vizImg.src = `${data.viz_url}?t=${Date.now()}`;
          // 실제 표시/스크롤은 버튼에서 제어
        } else {
          vizImg.removeAttribute("src");
          vizSection.classList.remove("visible");
        }
      }

      // "시각화 이미지 보기" 버튼 클릭 시
      document.getElementById("toggleViz").addEventListener("click", () => {
        const vizSection = document.getElementById("vizSection");
        const vizImg = document.getElementById("vizImage");

        if (!vizImg.src) {
          alert("시뮬레이션 결과 이미지가 아직 없습니다.");
          return;
        }

        // 섹션 먼저 열기
        vizSection.classList.add("visible");

        const scrollToBottom = () => {
          // 레이아웃이 반영된 뒤에 문서 맨 아래로 스크롤
          requestAnimationFrame(() => {
            const h = Math.max(
              document.body.scrollHeight,
              document.documentElement.scrollHeight
            );
            window.scrollTo({
              top: h,
              behavior: "smooth",
            });
          });
        };

        // 이미지가 이미 로딩되어 있으면 바로(아주 살짝 딜레이 후) 스크롤
        if (vizImg.complete && vizImg.naturalHeight > 0) {
          setTimeout(scrollToBottom, 80);
        } else {
          // 처음 로딩 시: load 이벤트 후 한 번만 스크롤
          const onLoadOnce = () => {
            vizImg.removeEventListener("load", onLoadOnce);
            setTimeout(scrollToBottom, 80);
          };
          vizImg.addEventListener("load", onLoadOnce);

          // 혹시 load 이벤트를 놓치거나 에러가 나도, 일정 시간 뒤 한 번 시도
          setTimeout(scrollToBottom, 1000);
        }
      });
    </script>
  </body>
</html>
